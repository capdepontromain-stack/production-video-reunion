<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page introuvable — Production Vidéo 974 | Pull Up</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.ico" sizes="any"><link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"><link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png"><link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--noir:#0a0a0c;--charbon:#141419;--ligne:#26262e;--blanc:#f4f1ea;--gris:#a3a7b0;--rec:#ff3b30}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Space Grotesk",sans-serif;background:var(--noir);color:var(--blanc);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;line-height:1.7}
.cadre{max-width:560px;border:1px solid var(--ligne);background:var(--charbon);padding:56px 36px;position:relative}
.tc{letter-spacing:3px;font-size:12px;color:var(--gris);text-transform:uppercase}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--rec);animation:cligne 1.4s steps(2) infinite;margin-right:7px}
@keyframes cligne{to{opacity:.15}}
h1{font-family:"Syne",sans-serif;font-weight:800;font-size:clamp(60px,14vw,110px);color:var(--rec);line-height:1;margin:16px 0 8px}
p{color:var(--gris);margin-bottom:26px}
a.btn{display:inline-block;background:var(--rec);color:#fff;font-weight:700;text-decoration:none;padding:14px 28px;border-radius:3px}
</style>
</head>
<body>
<div class="cadre">
<span class="tc"><span class="dot"></span>COUPEZ ! — SCÈNE INTROUVABLE</span>
<h1>404</h1>
<p>Cette bobine n'existe pas (ou plus). Revenez au plateau principal : nos vidéos, nos prestations et notre équipe de tournage vous y attendent.</p>
<a class="btn" href="/">← Retour au plateau</a>
</div>
</body>
</html>
